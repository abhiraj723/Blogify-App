{% extends 'base.html' %}
{% load static %}
{% block main %}
<div class="row">
    <a href="{% url 'index' %}"><i class="position-absolute fa-solid fa-right-from-bracket fs-3 border rounded-circle border-2 back"></i></a>
    <div class="col-sm-7 mx-auto p-5">
        
        <h1 class="text-center my-3">
            {{blogs.title}}
        </h1>
        <h4 class="text-center my-5">
            {{blogs.subtitle}}
        </h4>
        <div class="">
            {% if blogs.image %}
            <img src="{{blogs.image.url}}" alt="" class="img-fluid">
            {% endif %}
        </div>
        <h3 class="fw-bold mt-4">Author - {{blogs.author}}</h3>
        <h5 class="fw-bold mb-4">Published - {{blogs.published_at}}</h5>
        <p class="fw-semibold">
            {{blogs.content|linebreaks}}
        </p>
    </div>
</div>
{% endblock %}
