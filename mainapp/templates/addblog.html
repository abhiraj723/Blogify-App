{% extends 'adminbase.html' %}
{% load static %}
{% block admin %}
<div class="row mt-3">
    <div class="col-sm-6 rounded-4 p-5 mx-auto shadow-lg">
        <h2 class="my-3 text-center fw-bold">Add New Blog</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit" class="btn w-100 my-3 py-2 mx-auto rounded-pill btn-primary">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
