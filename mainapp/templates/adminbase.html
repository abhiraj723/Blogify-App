{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container-fluid">
        <!-- header start -->
        <div class="row header bg-nav">
            <div class="col-sm-12 d-flex justify-content-between align-items-center border border-2">

                <h4 class="fw-bold"><a class="btn btn-dark me-3 shw" style="display: none;" data-bs-toggle="offcanvas"
                        href="#offcanvasExample" role="button" aria-controls="offcanvasExample">
                        <i class="fa-solid fa-bars"></i>
                    </a><span id="sh" class="text-light">Dashboard</span></h4>
                <button type="button" class="btn btn-light text-dark rounded-pill">
                    ADMIN <span class="badge text-bg-warning ms-2 rounded-pill"><i
                            class="fa-solid fa-user-tie"></i></span>
                </button>
            </div>
        </div>
        <!-- header end -->
        <!-- main start -->
        <div class="row main">
            <!-- sidebar class add krna hai neeche -->
            <div class="col-sm-2 bg-dark text-light h-100 sidebar">
                <ul class="list-unstyled mt-5">
                    <li class="mb-4 fs-5 das py-2">
                        <a href="{% url 'admindash' %}" class=" nav-link fw-bold d-flex">
                            <i class="fa-solid fa-gauge pe-5 ps-xl-3 fs-4 pt-1"></i><span>Dashboard</span></a>
                    </li>
                    <li class="mb-4 fw-bold fs-5 das py-2">
                        <a href="{% url 'addblog' %}" class="nav-link d-flex">
                            <i class="fa-solid fa-circle-plus pe-5 ps-xl-3 fs-4 pt-1"></i><span>AddBlog</span></a>
                    </li>
                    <li class="mb-4 fw-bold fs-5 das py-2">
                        <a href="{% url 'viewblog' %}" class="nav-link d-flex">
                            <i class="fa-solid fa-eye pe-5 ps-xl-3 fs-4 pt-1"></i><span>ViewBlog</span></a>
                    </li>
                </ul>
                <hr>
                <a href="{% url 'logout' %}" class="btn d-flex logout">
                    <i class="fa-solid fa-right-from-bracket text-light fs-4 ps-2 pe-5 pt-1"></i><span
                        class="fs-5 fw-bold text-light">LogOut</span></a>
            </div>
            <div class="col-lg-10 main-content h-100">

                {% block admin %}
                {% endblock %}

            </div>
        </div>
        <!-- main end -->

        <!-- Offcanvas start -->
        <div class="offcanvas offcanvas-start off" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
            id="offcanvasExample" aria-labelledby="offcanvasScrollingLabel">
            <div class="offcanvas-header" style="background-color: black;">
                <a class="offcanvas-title text-light fw-bold fs-3 nav-link" id="offcanvasScrollingLabel">BlogiFy</a>
                <button type="button" class="btn btn-close bg-light" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
            </div>
            <div class="offcanvas-body bg-info">
                <ul class="list-unstyled mt-5">
                    <li class="mb-4 fs-5">

                        <a href="{% url 'admindash' %}" class="nav-link fw-bold d-flex">
                            <i class="fa-solid fa-gauge pe-5 ps-3 fs-4 pt-1"></i><span>Dashboard</span></a>
                    </li>
                    <li class="mb-4 fw-bold fs-5">
                        <a href="{% url 'addblog' %}" class="nav-link  d-flex">
                            <i class="fa-solid fa-circle-plus pe-5 ps-3 fs-4 pt-1"></i><span>AddBlog</span></a>
                    </li>
                    <li class="mb-4 fw-bold fs-5">
                        <a href="{% url 'viewblog' %}" class="nav-link d-flex">
                            <i class="fa-solid fa-eye pe-5 ps-3 fs-4 pt-1"></i><span>ViewBlog</span></a>
                    </li>
                </ul>
                <hr>
                <a href="{% url 'logout' %}" class="btn btn-dark mt-5 w-100"><i
                        class="fa-solid fa-right-from-bracket text-light fs-4 pe-4 pt-1"></i><span
                        class="fs-5 fw-bold text-light">LogOut</span></a>
            </div>

        </div>

        <!-- Offcanvas end -->

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        {% if messages %}
        {% for m in messages %}
        <script>
            Swal.fire({
                title: "{{m}}",
                icon: "success",
                draggable: true
            });
        </script>
        {% endfor %}
        {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    
</body>

</html>
