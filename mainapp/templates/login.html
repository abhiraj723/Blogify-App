{% extends 'base.html' %}
{% load static %}
{% block main %}
<div class="row my-3 my-sm-5">
    <div class="col-11 col-sm-9 col-md-11 col-lg-10 col-xl-8 mx-auto shadow-lg py-5 rounded-3"
        style="background-color: white;">
        <div class="row">
            <div class="col-md-6 d-flex align-items-center justify-content-center">
                <img src="{% static 'img/register.png' %}" class="img-fluid" alt="">
            </div>
            <div class="col-md-6 px-3 px-md-5">
                <h1 class="text-center text-info pb-3">
                    Login.
                </h1>
                <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
                {% if messages %}
                {% for m in messages %}
                <script>
                    Swal.fire({
                        title: "{{m}}",
                        icon: "success",
                        draggable: true
                    });
                </script>
                {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <i class="fa-solid fa-user ps-2 pe-4"></i><label for="user" class="mb-2 fw-bold">Username</label>
                    <input type="text" name="username" id="user" class="form-control mb-4">
                    <i class="fa-solid fa-lock ps-2 pe-4"></i><label for="pass" class="mb-2 fw-bold">Password</label>
                    <input type="password" name="password" id="pass" class="form-control mb-2">
                    <div class="d-flex justify-content-between mb-4 mx-2">
                        <span><input type="checkbox" name="" id=""> Remeber me</span>
                        <a href="" style="text-decoration: none;">Forgot Password?</a>
                    </div>
                    <button class="btn btn-primary w-100 rounded-pill" type="submit">Login</button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block title %}
Login
{% endblock %}
